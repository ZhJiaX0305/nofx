services:
  # Backend service (本地开发)
  nofx:
    image: ${DOCKER_USERNAME:-zhjiax}/${IMAGE_NAME:-nofx}:backend-local
    # build:
    #   context: .
    #   dockerfile: ./docker/Dockerfile.backend
    #   platforms:
    #     - linux/arm64  # Mac M1/M2 原生架构
    container_name: nofx-trading-local
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./config.db:/app/config.db
      - ./decision_logs:/app/decision_logs
      - ./prompts:/app/prompts  # 实时加载 prompt 文件
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
    networks:
      - nofx-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend service (本地开发)
  nofx-frontend:
    image: ${DOCKER_USERNAME:-zhjiax}/${IMAGE_NAME:-nofx}:frontend-local
    # build:
    #   context: .
    #   dockerfile: ./docker/Dockerfile.frontend
    #   platforms:
    #     - linux/arm64  # Mac M1/M2 原生架构
    container_name: nofx-frontend-local
    restart: unless-stopped
    ports:
      - "3000:80"  # 本地开发直接暴露端口
    networks:
      - nofx-network
    depends_on:
      - nofx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nofx-network:
    driver: bridge

